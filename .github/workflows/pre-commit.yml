name: Pre-commit (CI re-run)

# Phase 1 PR 1: dev local の pre-commit が `--no-verify` で bypass された場合の server side
# 防衛線。.pre-commit-config.yaml と同じ hook を CI で再実行し、PR / push に対して fail させる。
# 既存 ci.yml の Ruff / Biome step は撤去せず併存する (cache 効率と failure isolation)。

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit (gitleaks + hadolint + ruff + biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks の history scan に備えて全 history を取得 (現在は staged/PR diff のみだが、
          # 将来 detect モードに切替えた時に shallow clone だと commit が見えない罠を回避)。
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies (for ruff)
        run: uv sync --frozen
        working-directory: backend

      - name: Install frontend dependencies (for biome)
        run: npm ci
        working-directory: frontend

      - name: Cache pre-commit hook envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure
