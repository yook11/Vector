name: Schemathesis Nightly

# Phase 2 #1 (Phase 0 鏡像): FastAPI /openapi.json と実装の適合性 fuzz (blocking 化済)。
# - 5xx leak / undeclared status / response schema mismatch を property-based fuzz で検出
# - 初回は GET only + minimal checks (not_a_server_error / status_code_conformance /
#   response_schema_conformance) で signal 切り分け
# - JUnit XML + VCR cassette を Actions Artifacts に保存 (Code scanning GHAS disabled)
#
# 段階的昇格 (Phase 0 / 1 と同型):
#   * 本 PR: warn-only (continue-on-error: true)
#   * 次 PR-A: finding triage (実装 or schema 修正)
#   * 次 PR-B: continue-on-error 削除 → blocking 化 (Phase 1 finding gate 化 PR と同型)
#   * 次 PR-C: POST/PUT/DELETE / stateful / PR gate 化 (Out of Scope)

on:
  schedule:
    # UTC 18:37 = JST 03:37 (Trivy nightly UTC 18:17 と 20 分ずらし、
    # uvicorn 起動を伴うため runner 同時負荷を回避)
    - cron: '37 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: schemathesis-nightly
  cancel-in-progress: false

jobs:
  schemathesis:
    name: Schemathesis (FastAPI spec conformance)
    runs-on: ubuntu-latest
    timeout-minutes: 45  # 25 examples × GET endpoints + uvicorn 起動 + alembic で十分

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-bookworm
        env:
          POSTGRES_USER: vector
          POSTGRES_PASSWORD: vector
          POSTGRES_DB: vector
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vector -d vector"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # backend runtime は migration role (vector) で接続する。Schemathesis は
      # auth.* schema を直接 fuzz しないが、alembic migration が watchlist_entries
      # → auth.user FK や n3_grant_app_db_users で vector_auth/vector_app role への
      # GRANT を流すため、Better Auth schema 生成 + role 作成 + ALEMBIC_ALLOW_DESTRUCTIVE
      # が ci.yml frontend-e2e-smoke job (lines 271-339) と同じく必要になる。
      DATABASE_URL: postgresql+asyncpg://vector:vector@localhost:5432/vector
      REDIS_URL: redis://localhost:6379/0
      # Better Auth CLI が config load 時に require する env (frontend/src/lib/env.ts)。
      # ci.yml frontend-e2e-smoke job と同値の non-secret CI dummy。
      BETTER_AUTH_URL: http://localhost:3000
      # CI 専用のダミー値。本番値とは無関係で、Settings の長さ要件 (>=32) を
      # 満たすために 64 桁の hex を直書きする (秘密ではない、ci.yml と同値)。
      # 2 分割した secret は互いに別値で投入する (ci.yml と同値)。
      BFF_JWT_SIGNING_SECRET: ci4444444444444444444444444444444444444444444444444444444444444444
      REVALIDATE_BEARER_SECRET: ci5555555555555555555555555555555555555555555555555555555555555555
      BETTER_AUTH_SECRET: ci1111111111111111111111111111111111111111111111111111111111111111
      POSTGRES_AUTH_PASSWORD: ci2222222222222222222222222222222222222222222222222222222222222222
      POSTGRES_APP_PASSWORD: ci3333333333333333333333333333333333333333333333333333333333333333
      # vector_collect は alembic z14_grant_collect_role の GRANT 対象 (ci.yml と同値)。
      POSTGRES_COLLECT_PASSWORD: ci6666666666666666666666666666666666666666666666666666666666666666
      FRONTEND_URL: http://localhost:3000
      # PR8 (red-team S-AUTH-4) で default 撤去 → env 必須化された URL 系。
      INTERNAL_FRONTEND_BASE_URL: http://frontend:3000
      # CI では stub embedder で外部 Gemini API 到達を避ける。
      # production deploy 時は stub→gemini を起動時 reject (factory 側で guard)。
      # 本物 API key を CI に置かないことで cost / supply chain 両面の表面を絞る。
      EMBEDDER_PROVIDER: stub

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend

      # ---- frontend (Better Auth CLI で auth.* テーブル生成にだけ使う) ----
      # Schemathesis 自体は backend のみ叩くが、watchlist_entries 等の alembic
      # migration が auth.user への FK を持つため、Better Auth schema が先に
      # 存在していないと CREATE TABLE で UndefinedTableError が出る (red-team C2 /
      # ADR 002 で Better Auth schema は alembic 管理外)。
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # auth スキーマと Better Auth テーブル群は alembic 管理外 (ADR 002)。
      # alembic upgrade head の前に schema と Better Auth テーブルが存在している
      # 必要がある。ci.yml frontend-e2e-smoke job (lines 271-309) と同じ手順:
      #   1. psql で `auth` スキーマだけ作る (alembic b1 が CREATE SCHEMA IF NOT
      #      EXISTS する処理と同等。idempotent)
      #   2. Better Auth CLI が auth.user / auth.account / auth.session を生成
      - name: Create auth schema (pre-Better Auth)
        env:
          PGPASSWORD: vector
        run: psql -h localhost -U vector -d vector -c "CREATE SCHEMA IF NOT EXISTS auth"

      # `setup-node` の `~/.npm` cache は package-lock 全体ハッシュ key で、CLI の
      # _npx tarball が永続化されないため、CLI バージョン直接 key の専用 cache を
      # 別建てする (ci.yml と同形)。
      - name: Cache Better Auth CLI (npx tarball + extracted)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.npm/_npx
            ~/.npm/_cacache
          key: better-auth-cli-${{ runner.os }}-1.4.21

      - name: Apply Better Auth schema
        # `auth.ts` は `import "server-only"` を持つため CLI が load できない。
        # CLI 専用の `auth.cli.ts` (server-only なし、runtime と同 config) を経由する。
        # AUTH_DATABASE_URL を vector で override: CLI は CREATE TABLE 等の DDL を
        # 実行するため table owner (vector) で接続する必要 (red-team AUTH-N4)。
        env:
          AUTH_DATABASE_URL: postgresql://vector:vector@localhost:5432/vector?search_path=auth
        run: npx --yes @better-auth/cli@1.4.21 migrate --config src/lib/auth/auth.cli.ts -y
        working-directory: frontend

      # red-team AUTH-N4: alembic n3_grant_app_db_users / z14_grant_collect_role が
      # GRANT を流す前提として vector_auth / vector_app / vector_collect role が
      # 存在する必要がある。本番では init script
      # (infra/db/init/01_create_app_users.sh) が docker entrypoint init で作るが、
      # GitHub Actions の service container は initdb.d を ignore するため、
      # ここで psql 経由で idempotent に role を作成する (ci.yml と同形)。
      - name: Create application Postgres roles (vector_auth, vector_app, vector_collect)
        env:
          PGPASSWORD: vector
        run: |
          psql -h localhost -U vector -d vector <<EOF
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_auth') THEN
              CREATE ROLE vector_auth WITH LOGIN PASSWORD '${{ env.POSTGRES_AUTH_PASSWORD }}';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_app') THEN
              CREATE ROLE vector_app  WITH LOGIN PASSWORD '${{ env.POSTGRES_APP_PASSWORD }}';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_collect') THEN
              CREATE ROLE vector_collect WITH LOGIN PASSWORD '${{ env.POSTGRES_COLLECT_PASSWORD }}';
            END IF;
          END \$\$;
          EOF

      - name: Apply alembic migrations
        # ALEMBIC_ALLOW_DESTRUCTIVE は 4d16d9b326a0 (topics drop, article_analyses
        # wipe) の安全 guard 用。fresh DB で wipe 対象データは存在しないため CI では
        # 問題なく許可できる (ci.yml lines 332-339 と同形)。
        env:
          ALEMBIC_ALLOW_DESTRUCTIVE: yes-i-know
        run: uv run alembic upgrade head
        working-directory: backend

      # ci.yml frontend-e2e-smoke job (lines 382-400) の uvicorn nohup + curl health-wait
      # pattern を完全コピー流用 (既存 known-good 設定の再利用)。
      - name: Start backend (uvicorn, background)
        run: |
          nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > "${RUNNER_TEMP}/backend.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/backend.pid"
        working-directory: backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null; then
              echo "backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to become healthy in 60s"
          cat "${RUNNER_TEMP}/backend.log" || true
          exit 1

      # admin JWT を 1 時間有効で発行。iss / aud / required claims は
      # backend/app/dependencies.py:22-90 と同値 (require: exp, iat, sub, role)。
      # uv run 経由で backend deps の PyJWT を再利用 (separate pip install 不要)。
      # ::add-mask:: で token をログ非表示にし、$GITHUB_ENV で次 step に渡す。
      # 署名鍵は backend の effective_bff_jwt_secret と同値: Phase A.3 で
      # BFF_JWT_SIGNING_SECRET を必須化したため legacy fallback は廃止し直参照する。
      - name: Mint admin JWT for Schemathesis
        working-directory: backend
        run: |
          TOKEN=$(uv run python -c "
          import jwt, time, uuid, os
          claims = {
              'sub': str(uuid.UUID('00000000-0000-0000-0000-000000000001')),
              'role': 'admin',
              'iss': 'vector-bff',
              'aud': 'vector-backend',
              'iat': int(time.time()),
              'exp': int(time.time()) + 3600,
          }
          print(jwt.encode(claims, os.environ['BFF_JWT_SIGNING_SECRET'], algorithm='HS256'))
          ")
          echo "::add-mask::${TOKEN}"
          echo "SCHEMATHESIS_TOKEN=${TOKEN}" >> "$GITHUB_ENV"

      # CI-only tool で backend runtime と分離 (Semgrep 先例 = security-pr.yml:101-103
      # と同型、pyproject に追加しない)。version は明示 pin、bump は changelog review
      # を伴う PR で対応 (rev manual update 規約と同型)。
      - name: Install Schemathesis
        run: pip install 'schemathesis==4.17.0'

      # Schemathesis 4.x flag 仕様 (3.x → 4.x で renamed あり):
      # - --include-method GET: GET endpoint のみ fuzz (初回は signal 切り分け優先)
      # - -H Authorization: ... : admin JWT を全 request に固定付与
      # - --checks: not_a_server_error / status_code_conformance /
      #   response_schema_conformance のみ (--checks=all は header / content-type
      #   系ノイズ多発のため最低限 3 つで signal を見極める)
      # - -n 25 (= --max-examples 25): default 100 で nightly 30 分超リスク、
      #   25 で endpoints × 25 ≈ 数百 input に抑制
      # - --phases examples,coverage,fuzzing: stateful 除外 (OpenAPI links 未定義、
      #   stateful 化は別 PR)
      # - --report junit,vcr + --report-dir: output ディレクトリに集約して
      #   artifact 1 つで上げる
      - name: Run Schemathesis (blocking)
        run: |
          schemathesis run http://localhost:8000/openapi.json \
            -H "Authorization: Bearer ${SCHEMATHESIS_TOKEN}" \
            --checks not_a_server_error,status_code_conformance,response_schema_conformance \
            -n 25 \
            --phases examples,coverage,fuzzing \
            --report junit,vcr \
            --report-dir schemathesis-report

      - name: Upload Schemathesis artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: schemathesis-results
          path: schemathesis-report/
          retention-days: 14

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: schemathesis-backend-log
          path: ${{ runner.temp }}/backend.log
          retention-days: 14
