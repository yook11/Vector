name: Security (PR gate)

# Phase 1 PR 2 で導入、Phase 1 finding gate 化 PR で blocking に昇格 (本 file)。
# - osv-scanner: backend/uv.lock + frontend/package-lock.json の OSV.dev 照合
# - npm audit: frontend の npm Advisory DB 照合 (production deps のみ)
# - Semgrep CE: backend/frontend ソースの SAST (p/owasp-top-ten + p/security-audit)
#
# 全 3 step は **blocking** mode (`fail-on-vuln: true` / 素の exit code / `--error`)。
# main の finding が 0 になった時点 (PR #392 / #391 / #390 merged) で warn-only から
# 昇格した。新規 finding は CI fail として PR を block する。
#
# 既存 security-nightly.yml (Trivy fs/config) は撤去せず並存。Trivy は OS+lib、
# osv-scanner は lib only という非対称性 + failure isolation を理由に重複維持。

on:
  pull_request:
    branches: [main]
  push:
    # develop 廃止 + feature branch への push 重複解消 (PR では pull_request trigger
    # のみ走り、main への merge 時のみ push trigger が走る)。
    branches: [main]

# 同一 branch / PR の古い run を新しい push で cancel する。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # NOTE: `security-events: write` は osv-scanner reusable workflow が permission として
  # 宣言要求するため必要。Vector は private repo + GitHub Free で Code scanning (GHAS)
  # が無効なため、実際の SARIF upload は `upload-sarif: false` で skip する設計だが、
  # caller の permission 宣言は reusable workflow の require を満たさないと
  # startup_failure になる。
  security-events: write
  actions: read           # osv-scanner reusable workflow が要求

jobs:
  # ---- osv-scanner: 公式 reusable workflow を SHA pin で呼ぶ ----
  # reusable workflow が内部で base/head 差分 scan + osv-reporter を完結する。
  # 内部 step も SHA pin 済で supply chain 表面が小さい。
  #
  # NOTE: `upload-sarif: false` にしている。Vector は private repo + GitHub Free で
  # Code scanning (GHAS) が disabled なため、SARIF を Code Scanning に upload すると
  # configuration error で job が fail する。reusable workflow は `osv-results.sarif`
  # を artifact として別途 upload するので、Actions Artifacts から DL して triage 可能。
  # GHAS 契約 or repo public 化で Code scanning が enable されたら upload-sarif: true に戻す。
  osv-scan:
    name: OSV-Scanner (lockfile SCA)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
    with:
      # `-r ./` で再帰探索し backend/uv.lock + frontend/package-lock.json を拾う。
      scan-args: |-
        -r
        ./
      results-file-name: osv-results.sarif
      fail-on-vuln: true   # blocking (Phase 1 finding gate 化で warn-only から昇格)
      upload-sarif: false  # Code scanning disabled (上記 NOTE 参照)、artifact のみ

  # ---- npm audit: 自前 job (third-party action 依存なし) ----
  npm-audit:
    name: npm audit (frontend SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `--omit=dev` で production deps のみ (dev tool advisory はノイズ多い)。
      # `--audit-level=high` で HIGH+CRITICAL に絞る (Trivy の severity と揃える)。
      # blocking mode: HIGH+ finding 検出で `npm audit` が exit 1 → step fail。
      # JSON 出力は logs と artifact に残し、triage で参照する用途は維持。
      - name: npm audit (production, HIGH+)
        working-directory: frontend
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=high --json | tee npm-audit.json
          echo "---- summary ----"
          jq '{ vulnerabilities: .metadata.vulnerabilities, total: .metadata.totalDependencies }' npm-audit.json

      - name: Upload npm audit JSON artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: npm-audit-json
          path: frontend/npm-audit.json
          retention-days: 14

  # ---- Semgrep CE: pip install + CLI 直接呼び出し ----
  # 公式 `semgrep/semgrep-action` は archived。CLI 直接呼び出しが現役推奨経路。
  # `semgrep ci` は OSS rule + ローカル scan で動作 (SEMGREP_APP_TOKEN 不要、登録不要)。
  semgrep:
    name: Semgrep CE (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # `semgrep ci` は base/HEAD 比較で incremental scan を行うため fetch-depth: 0 が安全。
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      # `pip install semgrep` で latest stable。bump 時は PR review で changelog 確認。
      - name: Install Semgrep
        run: pip install semgrep

      # focused ruleset 2 つ。`p/python` `p/javascript` のような generic ruleset は
      # signal/noise 比が悪い (Vector 探索結果より)。
      # blocking mode: `semgrep ci` は finding 検出で exit 1 がデフォルト挙動。
      # `|| true` を削除して step fail を CI fail に伝搬させる。
      #
      # NOTE: 出力 format に `--json` を採用し `--sarif` は使わない。Semgrep CE には
      # `--sarif` 出力経路が `# nosemgrep` suppress を反映しない既知 bug
      # (semgrep/semgrep#6658) があり、同一 scan で `--json` だと Findings: 0 だが
      # `--sarif` だと Findings: 4 になる挙動を local 再現で確認済。Vector は GHAS
      # disabled で SARIF を Security tab に upload しないため format 差異の運用影響
      # は無い。triage は JSON artifact から `jq` で抽出する。bug が fix されたら
      # `--sarif` 経路に戻して Code scanning 連携の余地を取り戻す。
      - name: Run Semgrep (blocking)
        run: |
          semgrep ci \
            --json --output=semgrep.json \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --metrics=off

      # JSON artifact として保存 (上記 NOTE 参照、SARIF は bug #6658 で suppress 失敗)。
      # triage は Actions Artifacts から DL → `jq '.results[] | {check_id, path, start}'` 等。
      - name: Upload Semgrep JSON artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: semgrep-json
          path: semgrep.json
          retention-days: 14
