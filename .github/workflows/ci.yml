name: CI

on:
  push:
    # develop 廃止 + feature branch への push 重複解消 (PR では pull_request trigger
    # のみ走り、main への merge 時のみ push trigger が走る)。
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
      - '.claude/**'

# 同一 branch / PR の古い run を新しい push で cancel する。force push / 連打時の
# 計算資源消費を抑制。schemathesis-nightly は schedule 専用で別の concurrency 設定。
# ただし main (= 自動 deploy が走る) では cancel しない: deploy 進行中に後続 push が
# 来ても release を中断させない (中途半端な deploy を防ぐ)。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # E2E smoke を path-filter で関連変更 PR のみに走らせるため、changed file
  # 判定を 1 ジョブに切り出す。Vector は GitHub Free / private repo で
  # branch protection / required checks が使えないため、skip しても merge を
  # ブロックしない。auth/E2E に無関係な PR (例: backend digest refactor、docs)
  # では `frontend-e2e-smoke` 全体が skip され CI wallclock が縮む。
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # dorny/paths-filter は PR の changed files を GitHub REST API で
    # listFiles する。デフォルトの GITHUB_TOKEN ではこの権限が無いため
    # `pull-requests: read` を明示的に付与する。
    # 注意: `permissions:` を明示すると省略した権限は剥奪される仕様のため、
    # `actions/checkout` が必要とする `contents: read` も併記する必要がある。
    permissions:
      contents: read
      pull-requests: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
      # deploy-production の per-area gate 用。backend/frontend のどちらが変わったかで
      # release step を出し分け、migrations 変更は自動 deploy を block する。
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      migration_files: ${{ steps.filter.outputs.migrations_files }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          list-files: json
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            # 自動 deploy を止める判定 (本 slice は migration を手動運用)。
            migrations:
              - 'backend/alembic/versions/**'
            e2e:
              # frontend auth コア
              - 'frontend/src/lib/auth/**'
              - 'frontend/src/lib/proxy/**'
              - 'frontend/src/features/auth/**'
              - 'frontend/src/proxy.ts'
              # E2E spec / config
              - 'frontend/e2e/**'
              - 'frontend/playwright.config.ts'
              # 依存・設定
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - 'frontend/next.config.js'
              # backend (E2E が叩く API + auth 認可経路)
              - 'backend/app/main.py'
              - 'backend/app/config.py'
              - 'backend/app/dependencies.py'
              - 'backend/alembic/versions/**'
              - 'backend/pyproject.toml'
              - 'backend/uv.lock'
              - 'backend/Dockerfile'
              # CI / インフラ
              - '.github/workflows/ci.yml'
              - 'docker-compose.yml'

  backend-unit:
    name: Backend (unit + lint)
    runs-on: ubuntu-latest

    env:
      # unit テストは実際には接続しないが、conftest が settings.database_url を
      # モジュール load 時に参照するため URL 形式 validation を満たすダミーが必要。
      DATABASE_URL: postgresql+asyncpg://vector:vector@localhost:5432/unit_dummy
      # CI 専用のダミー値。本番値とは無関係で、Settings の長さ要件 (>=32) を
      # 満たすために 64 桁の hex を直書きする (秘密ではない)。2 分割した secret は
      # 互いに別値で投入する (同一値拒否を回避)。
      BFF_JWT_SIGNING_SECRET: ci4444444444444444444444444444444444444444444444444444444444444444
      REVALIDATE_BEARER_SECRET: ci5555555555555555555555555555555555555555555555555555555555555555
      # PR8 (red-team S-AUTH-4) で default 撤去 → env 必須化された URL 系。
      FRONTEND_URL: http://localhost:3000
      INTERNAL_FRONTEND_BASE_URL: http://frontend:3000

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Ruff lint
        run: uv run ruff check app/
        working-directory: backend

      - name: Ruff format check
        run: uv run ruff format --check app/
        working-directory: backend

      - name: Run unit tests
        run: uv run pytest tests/ -m unit -x -q --durations=20
        working-directory: backend

  backend-integration:
    name: Backend (integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-bookworm
        env:
          POSTGRES_USER: vector
          POSTGRES_PASSWORD: vector
          POSTGRES_DB: vector
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vector -d vector"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://vector:vector@localhost:5432/vector
      # CI 専用のダミー値。本番値とは無関係で、Settings の長さ要件 (>=32) を
      # 満たすために 64 桁の hex を直書きする (秘密ではない)。2 分割した secret は
      # 互いに別値で投入する (同一値拒否を回避)。
      BFF_JWT_SIGNING_SECRET: ci4444444444444444444444444444444444444444444444444444444444444444
      REVALIDATE_BEARER_SECRET: ci5555555555555555555555555555555555555555555555555555555555555555
      # PR8 (red-team S-AUTH-4) で default 撤去 → env 必須化された URL 系。
      FRONTEND_URL: http://localhost:3000
      INTERNAL_FRONTEND_BASE_URL: http://frontend:3000

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Run integration tests
        run: uv run pytest tests/ -m integration -x -q --durations=20
        working-directory: backend

  frontend:
    name: Frontend (lint + type check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Biome check
        run: npx biome check src/
        working-directory: frontend

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Vitest (unit)
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-e2e-smoke:
    name: Frontend (E2E smoke)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    # smoke スコープは anon project (login + register、4 ケース)。
    # - login: seed migration の health check + Better Auth 経路の regression 検出
    # - register: 新規ユーザ登録 + client-side validation の regression 検出
    # watchlist / search / weekly-trends / source-admin は seed 状態に依存して
    # flaky になりうるためローカル only。Phase 4 で個別 CI 化を検討する。
    #
    # path-filter で auth/E2E 関連変更のみ実行する (`changes` job 参照)。
    # 無関係な PR では skip され、CI wallclock は backend-integration の 95s
    # 程度に律速される。

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-bookworm
        env:
          POSTGRES_USER: vector
          POSTGRES_PASSWORD: vector
          POSTGRES_DB: vector
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vector -d vector"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # red-team AUTH-N4: application 接続は vector_app (public.* DML) / vector_auth
      # (auth.* DML) に分離。alembic / pytest fixture は migration role (vector) で
      # 動かすため MIGRATION_DATABASE_URL を別経路で渡す。
      DATABASE_URL: postgresql+asyncpg://vector_app:ci3333333333333333333333333333333333333333333333333333333333333333@localhost:5432/vector
      MIGRATION_DATABASE_URL: postgresql+asyncpg://vector:vector@localhost:5432/vector
      REDIS_URL: redis://localhost:6379/0
      # frontend (Better Auth + 内部 API プロキシ)。runtime 接続は vector_auth、
      # Better Auth CLI が DDL を流す step だけ vector に override する (下記 step 参照)。
      AUTH_DATABASE_URL: postgresql://vector_auth:ci2222222222222222222222222222222222222222222222222222222222222222@localhost:5432/vector?search_path=auth
      BETTER_AUTH_URL: http://localhost:3000
      INTERNAL_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      # CI 専用のダミー値。本番値とは無関係で、Settings の長さ要件 (>=32) を
      # 満たすために 64 桁の hex を直書きする (秘密ではない)。2 分割した secret は
      # 互いに別値で投入する。frontend (next dev) と backend (uvicorn) は
      # この job env を共有するため、両側で同じ secret に揃う。
      BFF_JWT_SIGNING_SECRET: ci4444444444444444444444444444444444444444444444444444444444444444
      REVALIDATE_BEARER_SECRET: ci5555555555555555555555555555555555555555555555555555555555555555
      BETTER_AUTH_SECRET: ci1111111111111111111111111111111111111111111111111111111111111111
      POSTGRES_AUTH_PASSWORD: ci2222222222222222222222222222222222222222222222222222222222222222
      POSTGRES_APP_PASSWORD: ci3333333333333333333333333333333333333333333333333333333333333333
      # vector_collect は alembic z14_grant_collect_role の GRANT 対象。role が
      # 不在だと migration が hard-fail するため、CI でも作成して password を渡す。
      POSTGRES_COLLECT_PASSWORD: ci6666666666666666666666666666666666666666666666666666666666666666
      # PR8 (red-team S-AUTH-4) で default 撤去 → env 必須化された URL 系。
      FRONTEND_URL: http://localhost:3000
      INTERNAL_FRONTEND_BASE_URL: http://frontend:3000

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # ---- backend (alembic upgrade で seed migration を含む全 head を適用) ----
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend

      # ---- frontend (build + start を background) ----
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # auth スキーマと Better Auth テーブル群は alembic 管理外 (ADR 002)。
      # PR4 で seed_e2e_users.py が auth.user / auth.account に upsert するので、
      # `Apply alembic migrations` および `Seed E2E test users` step の前に
      # schema と Better Auth テーブルが存在している必要がある。
      # 1. psql で `auth` スキーマだけ作る (alembic b1 が CREATE SCHEMA IF NOT
      #    EXISTS する処理と同等。idempotent)
      # 2. Better Auth CLI が auth.user / auth.account / auth.session を生成
      - name: Create auth schema (pre-Better Auth)
        env:
          PGPASSWORD: vector
        run: psql -h localhost -U vector -d vector -c "CREATE SCHEMA IF NOT EXISTS auth"

      # `setup-node@v6` は `~/.npm` 全体を cache 対象にするが key が
      # `package-lock.json` のハッシュ。npx で fetch される `_npx/<spec hash>/`
      # はバージョンを変えると別 subdir に展開されるため、lockfile が変わらない
      # PR では新 spec の `_npx` が populate されても hit 扱いで save されず
      # 永続化されない。CLI バージョンを直接 key にした専用 cache を別建てし、
      # `_npx` (展開先) と `_cacache` (tarball) を恒久キャッシュする。
      - name: Cache Better Auth CLI (npx tarball + extracted)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.npm/_npx
            ~/.npm/_cacache
          key: better-auth-cli-${{ runner.os }}-1.4.21

      - name: Apply Better Auth schema
        # `auth.ts` は `import "server-only"` を持つため CLI が load できない。
        # CLI 専用の `auth.cli.ts` (server-only なし、runtime と同 config) を
        # 経由する。frontend/src/lib/auth/auth.cli.ts のドキュメントを参照。
        # バージョンは @latest ではなく明示 pin。直前の `actions/cache` で
        # `_npx` が restore されていれば npx の install を skip して即起動。
        # AUTH_DATABASE_URL を vector で override: CLI は CREATE TABLE 等の DDL
        # を実行するため table owner (vector) で接続する必要。runtime (next dev)
        # は env 直下の vector_auth 接続を使う (red-team AUTH-N4)。
        env:
          AUTH_DATABASE_URL: postgresql://vector:vector@localhost:5432/vector?search_path=auth
        run: npx --yes @better-auth/cli@1.4.21 migrate --config src/lib/auth/auth.cli.ts -y
        working-directory: frontend

      # red-team AUTH-N4: alembic n3_grant_app_db_users / z14_grant_collect_role が
      # GRANT を流す前提として vector_auth / vector_app / vector_collect role が
      # 存在する必要がある。本番では init script
      # (infra/db/init/01_create_app_users.sh) が docker entrypoint init で作るが、
      # GitHub Actions の service container は initdb.d を ignore するため、
      # ここで psql 経由で idempotent に role を作成する。
      - name: Create application Postgres roles (vector_auth, vector_app, vector_collect)
        env:
          PGPASSWORD: vector
        run: |
          psql -h localhost -U vector -d vector <<EOF
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_auth') THEN
              CREATE ROLE vector_auth WITH LOGIN PASSWORD '${{ env.POSTGRES_AUTH_PASSWORD }}';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_app') THEN
              CREATE ROLE vector_app  WITH LOGIN PASSWORD '${{ env.POSTGRES_APP_PASSWORD }}';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_collect') THEN
              CREATE ROLE vector_collect WITH LOGIN PASSWORD '${{ env.POSTGRES_COLLECT_PASSWORD }}';
            END IF;
          END \$\$;
          EOF

      - name: Apply alembic migrations
        # ALEMBIC_ALLOW_DESTRUCTIVE は 4d16d9b326a0 (topics drop, article_analyses
        # wipe) の安全 guard 用。fresh DB で wipe 対象データは存在しないため
        # CI では問題なく許可できる。
        env:
          ALEMBIC_ALLOW_DESTRUCTIVE: yes-i-know
        run: uv run alembic upgrade head
        working-directory: backend

      - name: Seed E2E test users (CI only — red-team C2 防御で migration から分離)
        # PR4 で i4_seed_e2e_users migration を削除し、E2E seed を本 script に
        # 分離。production deploy で alembic upgrade head が走っても seed user は
        # 作られない。auth.user / auth.account は Better Auth CLI が先に生成済。
        env:
          E2E_SEED_USER_EMAIL: e2e@example.com
          E2E_SEED_USER_PASSWORD: Password123!
          E2E_SEED_ADMIN_EMAIL: e2e-admin@example.com
          E2E_SEED_ADMIN_PASSWORD: Password123!
        run: uv run python scripts/seed_e2e_users.py
        working-directory: backend

      # Playwright のブラウザバイナリ (~150MB) は毎回 download すると 30 秒以上
      # 食うため、`@playwright/test` のバージョンで keying して cache する。
      # cache key を package-lock 全体のハッシュにすると無関係な依存変更でも
      # 失効してしまうため、playwright のバージョンだけを抽出する。
      - name: Get Playwright version
        id: playwright-version
        working-directory: frontend
        run: |
          version=$(jq -r '.packages["node_modules/@playwright/test"].version' package-lock.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # cache miss 時のみ binary + system deps を install。cache hit 時は
      # ubuntu-24.04 GitHub-hosted runner に必要 apt パッケージ (libnss3 /
      # libxkbcommon0 / libgbm1 / libasound2t64 等) が同梱されているため、
      # browser binary の cache 復元のみで chromium が起動できる。
      # 将来 runner image が痩せて chromium 起動失敗するようになった場合は、
      # 削除した cache-hit 用 `npx playwright install-deps chromium` step を復元する。
      - name: Install Playwright chromium (binary + deps, cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start backend (uvicorn, background)
        run: |
          nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > "${RUNNER_TEMP}/backend.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/backend.pid"
        working-directory: backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null; then
              echo "backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to become healthy in 60s"
          cat "${RUNNER_TEMP}/backend.log" || true
          exit 1

      # `next start` は `output: "standalone"` build と組み合わせると静的 asset
      # の serve 経路が乖離し、本番 build の JS bundle が browser に届かず
      # hydration 不能になる (E2E では form の onSubmit が attach されず
      # GET 経由で submit されてしまう)。
      # smoke の目的は user flow の regression 検出であり build 経路の検証
      # ではないので、dev 経路 (`next dev`) で済ませる。本番 build のスモーク
      # は Phase 4 で別 PR にて検討する。
      - name: Start frontend (next dev, background)
        run: |
          nohup npm run dev -- --port 3000 \
            > "${RUNNER_TEMP}/frontend.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/frontend.pid"
        working-directory: frontend

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/auth/login > /dev/null; then
              echo "frontend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "frontend failed to become healthy in 60s"
          cat "${RUNNER_TEMP}/frontend.log" || true
          exit 1

      - name: Run E2E smoke (anon project)
        run: npx playwright test --project=anon
        working-directory: frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: e2e-server-logs
          path: |
            ${{ runner.temp }}/backend.log
            ${{ runner.temp }}/frontend.log
          retention-days: 7

  # ---- pre-commit (gitleaks + hadolint のみ、ruff/biome は backend-unit/frontend job に重複) ----
  # 旧 .github/workflows/pre-commit.yml を統合した job。dev で `--no-verify` bypass された
  # 場合の二次防衛として、CI で gitleaks (secret scan) + hadolint (Dockerfile lint) を再実行する。
  # ruff/biome は ci.yml 内の backend-unit / frontend job で既に走っているため、ここでは除外。
  pre-commit:
    name: Pre-commit (gitleaks + hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # gitleaks の history scan 拡張に備えて全 history を取得 (現状は staged/PR diff のみ)。
          fetch-depth: 0

      - name: Cache pre-commit hook envs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (gitleaks + hadolint only)
        run: |
          pip install pre-commit
          pre-commit run gitleaks --all-files --show-diff-on-failure
          pre-commit run hadolint-docker --all-files --show-diff-on-failure

  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.migrations == 'true'

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-bookworm
        env:
          POSTGRES_USER: vector
          POSTGRES_PASSWORD: vector
          POSTGRES_DB: vector
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vector -d vector"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://vector:vector@localhost:5432/vector
      MIGRATION_DATABASE_URL: postgresql+asyncpg://vector:vector@localhost:5432/vector
      BFF_JWT_SIGNING_SECRET: ci4444444444444444444444444444444444444444444444444444444444444444
      REVALIDATE_BEARER_SECRET: ci5555555555555555555555555555555555555555555555555555555555555555
      POSTGRES_AUTH_PASSWORD: ci2222222222222222222222222222222222222222222222222222222222222222
      POSTGRES_APP_PASSWORD: ci3333333333333333333333333333333333333333333333333333333333333333
      POSTGRES_COLLECT_PASSWORD: ci6666666666666666666666666666666666666666666666666666666666666666
      FRONTEND_URL: http://localhost:3000
      INTERNAL_FRONTEND_BASE_URL: http://frontend:3000

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Create auth schema and application roles
        env:
          PGPASSWORD: vector
        run: |
          psql -h localhost -U vector -d vector <<EOF
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth."user" (
            id uuid PRIMARY KEY
          );
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_auth') THEN
              CREATE ROLE vector_auth WITH LOGIN PASSWORD '${{ env.POSTGRES_AUTH_PASSWORD }}';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_app') THEN
              CREATE ROLE vector_app  WITH LOGIN PASSWORD '${{ env.POSTGRES_APP_PASSWORD }}';
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vector_collect') THEN
              CREATE ROLE vector_collect WITH LOGIN PASSWORD '${{ env.POSTGRES_COLLECT_PASSWORD }}';
            END IF;
          END \$\$;
          EOF

      - name: Require single Alembic head
        run: |
          head_count="$(uv run alembic heads | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' ')"
          if [ "$head_count" != "1" ]; then
            uv run alembic heads
            echo "::error::Alembic must have exactly one head, got ${head_count}."
            exit 1
          fi
        working-directory: backend

      - name: Apply migrations to ephemeral PostgreSQL
        env:
          ALEMBIC_ALLOW_DESTRUCTIVE: yes-i-know
        run: uv run alembic upgrade head
        working-directory: backend

      - name: Classify changed migration revisions
        env:
          MIGRATION_GATE_FILES_JSON: ${{ needs.changes.outputs.migration_files }}
        run: |
          set -o pipefail
          {
            echo "## Migration classification"
            echo ""
            echo "Changed migration files:"
            echo ""
            echo '```json'
            printf '%s\n' "$MIGRATION_GATE_FILES_JSON"
            echo '```'
            echo ""
            echo "Gate output:"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          uv run python scripts/migration_gate.py --files-json "$MIGRATION_GATE_FILES_JSON" \
            | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        working-directory: backend

  # ---- CI gate (全必須チェックの集約) ----
  # deploy-production が個別テスト job で先走らないよう、全テスト job を 1 つに
  # 集約する単一ゲート。deploy は本 job の success だけを待てばよい。
  # frontend-e2e-smoke / migration-check は path 条件で skip されうるため
  # success|skipped を許容し、それ以外 (backend-unit / backend-integration /
  # frontend / pre-commit) は success 必須とする。
  ci-gate:
    name: CI gate
    needs:
      - backend-unit
      - backend-integration
      - frontend
      - frontend-e2e-smoke
      - pre-commit
      - migration-check
    # 一部 needs が skip (e2e) されても本 job 自体は評価したいので !cancelled()。
    # 失敗 needs があっても下の script で明示判定して exit 1 する。
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all checks (frontend-e2e-smoke は skip 許容)
        run: |
          fail=0
          for r in \
            "backend-unit=${{ needs.backend-unit.result }}" \
            "backend-integration=${{ needs.backend-integration.result }}" \
            "frontend=${{ needs.frontend.result }}" \
            "pre-commit=${{ needs.pre-commit.result }}"; do
            if [ "${r#*=}" != "success" ]; then
              echo "::error::${r%%=*} = ${r#*=} (success required)"
              fail=1
            fi
          done
          e2e="${{ needs.frontend-e2e-smoke.result }}"
          case "$e2e" in
            success|skipped) echo "frontend-e2e-smoke = $e2e (ok)" ;;
            *) echo "::error::frontend-e2e-smoke = $e2e (success or skipped required)"; fail=1 ;;
          esac
          migration_check="${{ needs.migration-check.result }}"
          case "$migration_check" in
            success|skipped) echo "migration-check = $migration_check (ok)" ;;
            *) echo "::error::migration-check = $migration_check (success or skipped required)"; fail=1 ;;
          esac
          exit $fail

  migrate-production:
    name: Migrate production
    needs: [ci-gate, changes]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main'
            && needs.ci-gate.result == 'success'
            && needs.changes.outputs.migrations == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
    env:
      ENV: production
      # production Environment secret。owner role / TLS sslmode 付き URL を登録する。
      DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
      BFF_JWT_SIGNING_SECRET: ci4444444444444444444444444444444444444444444444444444444444444444
      REVALIDATE_BEARER_SECRET: ci5555555555555555555555555555555555555555555555555555555555555555
      FRONTEND_URL: https://vector.example.invalid
      INTERNAL_FRONTEND_BASE_URL: https://your-vector-frontend-app.internal.flycast
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Gate pending production migration range
        run: |
          set +e
          uv run python scripts/migration_gate.py --pending | tee "${RUNNER_TEMP}/migration-gate.txt"
          status="${PIPESTATUS[0]}"
          {
            echo "## Production migration gate"
            echo ""
            echo '```'
            cat "${RUNNER_TEMP}/migration-gate.txt"
            echo '```'
            if [ "$status" != "0" ]; then
              echo ""
              echo "Contract or unknown pending migration detected. Apply it manually with the production owner URL, then rerun deploy."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
        working-directory: backend

      - name: Apply production migrations
        run: |
          before="$(uv run alembic current || true)"
          uv run alembic upgrade head
          after="$(uv run alembic current || true)"
          {
            echo "## Production migration apply"
            echo ""
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| before | \`${before//$'\n'/; }\` |"
            echo "| after | \`${after//$'\n'/; }\` |"
          } >> "$GITHUB_STEP_SUMMARY"
        working-directory: backend

  # ---- 本番デプロイ (main merge → git SHA tag で build once → core/collect/frontend) ----
  # 業界標準の核: Build once / immutable artifact = git SHA / tested artifact を deploy。
  # 1 job で step を順序実行し backend (core→collect 同一 image) → frontend の順に release。
  # ci-gate の success だけを gate にするので個別テスト結果には依存しない。
  deploy-production:
    name: Deploy production (backend -> frontend)
    needs: [ci-gate, changes, migrate-production]
    # main への push かつ ci-gate 成功、かつ backend/frontend のいずれかが変わったときのみ。
    # migrate-production は migration 変更なしでは skip されるため、!cancelled() で
    # skipped needs を評価対象にし、migration 変更時だけ success を要求する。
    if: ${{ !cancelled()
            && github.event_name == 'push' && github.ref == 'refs/heads/main'
            && needs.ci-gate.result == 'success'
            && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
            && (needs.changes.outputs.migrations != 'true' || needs.migrate-production.result == 'success') }}
    runs-on: ubuntu-latest
    # Fly の health check 待ち等で release が stuck したとき、main は直列化されるため
    # 後続 deploy が無限に待たされる。45 分で打ち切り (前 run を手動 cancel 不要に)。
    timeout-minutes: 45
    permissions:
      contents: read
    # deploy 同士は直列化する (並行 release で image race を避ける)。CI 全体の
    # concurrency とは別 group にし、進行中の deploy は cancel しない。
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      # org-scoped token (collect が core の registry image を cross-app pull するため
      # 必須)。GitHub repo secret に登録する。手動前提は plan file / runbook 参照。
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      # deploy 判定を Step Summary に焼く: paths-filter の結果と SHA を可視化し、
      # 「deploy したつもりが skip されていた」を run 概要から追えるようにする。
      - name: Summarize deploy decision
        run: |
          {
            echo "## Deploy decision"
            echo ""
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| sha | \`${{ github.sha }}\` |"
            echo "| backend | ${{ needs.changes.outputs.backend }} |"
            echo "| frontend | ${{ needs.changes.outputs.frontend }} |"
            echo "| migrations | ${{ needs.changes.outputs.migrations }} |"
            echo "| migrate-production | ${{ needs.migrate-production.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # v1.6

      # ---- backend を先に: build once → core / collect を同一 image で release ----
      # --build-only --push で build + registry push のみ (release しない)。image-label に
      # git SHA を焼くと ref は registry.fly.io/<app>:<SHA> に確定する。
      - name: Build & push backend image once (label = SHA)
        if: ${{ needs.changes.outputs.backend == 'true' }}
        working-directory: backend
        run: |
          flyctl deploy -c fly.core.toml -a your-vector-core-app \
            --remote-only --build-only --push --image-label "${{ github.sha }}"

      - name: Release vector-core (prebuilt image)
        if: ${{ needs.changes.outputs.backend == 'true' }}
        working-directory: backend
        run: |
          flyctl deploy -c fly.core.toml -a your-vector-core-app \
            --image "registry.fly.io/your-vector-core-app:${{ github.sha }}"

      - name: Release vector-collect (same image as core)
        if: ${{ needs.changes.outputs.backend == 'true' }}
        working-directory: backend
        run: |
          flyctl deploy -c fly.collect.toml -a your-vector-collect-app \
            --image "registry.fly.io/your-vector-core-app:${{ github.sha }}"

      # ---- frontend を後に: build + release (こちらは共有しないので通常 deploy) ----
      - name: Deploy frontend (build + release, label = SHA)
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        working-directory: frontend
        run: |
          flyctl deploy -c fly.toml -a your-vector-frontend-app \
            --remote-only --image-label "${{ github.sha }}"
