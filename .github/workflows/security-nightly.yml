name: Security Scan (Manual)

# Phase 0 security gate (Trivy fs + config scan)。
# - fs scan: backend/uv.lock + frontend/package-lock.json の既知 CVE 検出
# - config scan: Dockerfile + docker-compose.yml の IaC misconfig 検出
#
# Vector は private repo + GitHub Free で Code scanning (GHAS) が無効なため、
# SARIF を Code Scanning へ upload せず Actions Artifacts に保存する設計
# (Phase 1 PR 2 `security-pr.yml` と同パターン)。triage は Actions UI から DL。
# GHAS 契約 or repo public 化で Code scanning が enable されたら upload-sarif
# 経路に戻す。
#
# Phase 0 では warn-only (exit-code: '0') で start し finding triage 期間を確保した。
# Phase 1 finding gate 化 PR (本 PR) で exit-code: '1' に昇格して blocking 化した。
# 公開初期はworkflow_dispatchだけで実行し、定期scheduleは運用コスト確認後に判断する。
# 新規 HIGH+/CRITICAL finding は手動runをfailさせる。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy fs scan (lockfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # aquasecurity/trivy-action は 2026-03 に supply chain 攻撃で 76/77 tags
      # が force-push 改ざん。tag pin (`@v0.35.0`) では再発時に取り込まれる
      # 可能性があるため、StepSecurity / Aqua Security 公式が推奨する
      # 安全な commit SHA を直接 pin する。実装更新時は最新 clean commit を
      # https://github.com/aquasecurity/trivy-action/commits/master/ で再確認。
      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.35.0 = trivy v0.69.3 (2026-03-04 commit, pre-incident clean)
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'  # blocking (Phase 1 finding gate 化で warn-only から昇格)
          ignore-unfixed: true
          # trivy-action は format=sarif のとき TRIVY_SEVERITY を unset するため
          # severity input が CLI まで届かない (aquasecurity/trivy-action#309)。
          # `limit-severities-for-sarif: true` で severity input を SARIF/exit-code
          # 判定に伝播させる。GHAS disabled の Vector では SARIF 表示の網羅性低下は
          # 運用影響なし。
          limit-severities-for-sarif: true

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 14

  trivy-config:
    name: Trivy config scan (Dockerfile + compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.35.0 = trivy v0.69.3 (2026-03-04 commit, pre-incident clean)
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'  # blocking (Phase 1 finding gate 化で warn-only から昇格)
          # trivy-fs と同様、SARIF 経路の severity filter 無効化を回避
          # (aquasecurity/trivy-action#309)。
          limit-severities-for-sarif: true

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-config-sarif
          path: trivy-config.sarif
          retention-days: 14
