# ===========================================
# Vector - Docker Compose
# ===========================================
# このファイルはStep 2 (Docker環境構築) で完成させる。
# 以下はサービス構成のスケルトン。

services:
  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  # --- Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy

  # --- Database ---
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector}
      POSTGRES_DB: ${POSTGRES_DB:-vector}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector -d vector"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
