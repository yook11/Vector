# ===========================================
# Vector - Docker Compose
# ===========================================

services:
  # --- Frontend (BFF — public entry point) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-me-in-production-use-a-strong-random-secret}
      - BETTER_AUTH_URL=http://localhost:3000
      - AUTH_DATABASE_URL=postgresql://vector:vector@db:5432/vector?search_path=auth
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-change-me-in-production}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/components.json:/app/components.json
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/next.config.js:/app/next.config.js
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
      - internal

  # --- Backend (internal only — no ports exposed to host) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  # --- Database ---
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector}
      POSTGRES_DB: ${POSTGRES_DB:-vector}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector -d vector"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Redis (Task Queue Broker) ---
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data
    networks:
      - internal

  # --- taskiq worker (executes news pipeline tasks) ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # "app.tasks.taskiq_worker:broker" = broker object for taskiq
    # "app.tasks.taskiq_worker" = module for task auto-discovery
    # If tasks split into multiple modules later, replace with "app.tasks" package.
    command: taskiq worker app.tasks.taskiq_worker:broker app.tasks.taskiq_worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://vector:vector@db:5432/vector
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # --- taskiq scheduler (sends cron-triggered tasks to Redis) ---
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: taskiq scheduler app.tasks.taskiq_worker:scheduler
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://vector:vector@db:5432/vector
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  pgdata:
  redisdata:
