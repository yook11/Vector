# ===========================================
# Vector - Docker Compose
# ===========================================

# --- Shared worker config (anchor only, not a service) ---
x-worker-base: &worker-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    - DATABASE_URL=postgresql+asyncpg://vector_app:${POSTGRES_APP_PASSWORD}@db:5432/${POSTGRES_DB:-vector}
    - REDIS_URL=redis://redis:6379/0
  volumes:
    - ./backend/app:/app/app
  depends_on:
    backend:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - public
    - internal

services:
  # --- Frontend (BFF — public entry point) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required; generate one with `openssl rand -hex 32` and set it in .env}
      - BETTER_AUTH_URL=http://localhost:3000
      - AUTH_DATABASE_URL=postgresql://vector_auth:${POSTGRES_AUTH_PASSWORD}@db:5432/${POSTGRES_DB:-vector}?search_path=auth
      # 内部 trust 境界の共有秘密 (red-team C1 防御で 2 分割)。frontend は BFF JWT
      # を署名し revalidate Bearer を検証するため両 secret が必須。backend とは
      # 同値を共有する (.env 集約)。
      - BFF_JWT_SIGNING_SECRET=${BFF_JWT_SIGNING_SECRET:?BFF_JWT_SIGNING_SECRET is required; generate one with `openssl rand -hex 32` and set it in .env}
      - REVALIDATE_BEARER_SECRET=${REVALIDATE_BEARER_SECRET:?REVALIDATE_BEARER_SECRET is required; generate one with `openssl rand -hex 32` and set it in .env}
      # red-team C9 対策: rate limit (proxy.ts) 専用 Redis instance。本体 redis は
      # backend taskiq broker と相乗りで、XFF 詐称 + key 増殖で本体が OOM すると
      # broker / worker 全体が道連れ shutdown する構造リスクがあったため物理分離。
      - REDIS_URL_RL=redis://redis-rl:6379/0
      # fallback: REDIS_URL_RL 未設定時のみ採用 (managed Redis 単一 instance 構成
      # への退避経路)。dev では redis-rl を優先。
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/components.json:/app/components.json
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/next.config.js:/app/next.config.js
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-rl:
        condition: service_healthy
    networks:
      - public
      - internal

  # --- DB init: fresh volume bootstrap (3-stage) ---
  # docker compose up 一発で fresh volume が立ち上がるよう順序を宣言する。
  # 各 step は冪等で、既存 volume では数秒以内に no-op で通過する。
  # 順序:
  #   1. db-init-schema      auth schema 作成 + vector_auth に一時 CREATE 権限
  #   2. db-init-better-auth Better Auth CLI migrate (auth.user 等を作成)
  #   3. db-init-revoke-create 一時 CREATE 権限を REVOKE (n3 の意図と整合)
  #   4. db-init-alembic     alembic upgrade head (c7 で auth.user FK を張る)
  # 完走後に backend / worker / scheduler / frontend が起動する。
  db-init-schema:
    image: pgvector/pgvector:0.8.2-pg18-bookworm
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # auth schema 作成 + Better Auth CLI が migrate 中に CREATE TABLE できるよう
    # vector_auth に一時的に CREATE 権限を付与する (n3_grant_app_db_users は
    # USAGE のみ GRANT する設計のため、bootstrap には不足する)。CREATE 権限は
    # db-init-revoke-create で剥がす。
    entrypoint:
      - psql
      - -h
      - db
      - -U
      - ${POSTGRES_USER:-vector}
      - -d
      - ${POSTGRES_DB:-vector}
      - -v
      - ON_ERROR_STOP=1
      - -c
    command:
      - |
        CREATE SCHEMA IF NOT EXISTS auth;
        GRANT USAGE, CREATE ON SCHEMA auth TO vector_auth;
    networks:
      - internal
    restart: "no"

  db-init-better-auth:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        BETTER_AUTH_CLI_VERSION: ${BETTER_AUTH_CLI_VERSION:-1.4.22}
    depends_on:
      db-init-schema:
        condition: service_completed_successfully
    environment:
      # vector_auth ロールで接続し search_path=auth で auth schema 内に
      # user / session / account / verification を作る。
      AUTH_DATABASE_URL: postgresql://vector_auth:${POSTGRES_AUTH_PASSWORD}@db:5432/${POSTGRES_DB:-vector}?search_path=auth
      # auth.cli.ts は trustedOrigins で BETTER_AUTH_URL を requireEnv する
      # (config 全体が CLI 起動時に evaluate されるため値が必要)。値自体は
      # migrate 経路では使われないが Settings 検証に必要。
      BETTER_AUTH_URL: http://localhost:3000
    working_dir: /app
    user: root
    # frontend dev image の build 段階で /opt/ba-cli に Better Auth CLI を
    # 焼き込んでいるため (frontend/Dockerfile dev stage)、internal network
    # (外部 egress 不可) のまま binary を呼べる。auth.cli.ts は
    # requireEnv("AUTH_DATABASE_URL") のみ参照するため BETTER_AUTH_SECRET 等
    # は不要 (CLI は schema 生成のみ)。
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        cd /app
        yes y | /opt/ba-cli/node_modules/.bin/better-auth migrate \
          --config src/lib/auth/auth.cli.ts
    networks:
      - internal
    restart: "no"

  db-init-revoke-create:
    image: pgvector/pgvector:0.8.2-pg18-bookworm
    depends_on:
      db-init-better-auth:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    entrypoint:
      - psql
      - -h
      - db
      - -U
      - ${POSTGRES_USER:-vector}
      - -d
      - ${POSTGRES_DB:-vector}
      - -v
      - ON_ERROR_STOP=1
      - -c
    command:
      - REVOKE CREATE ON SCHEMA auth FROM vector_auth;
    networks:
      - internal
    restart: "no"

  db-init-alembic:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db-init-revoke-create:
        condition: service_completed_successfully
    # backend Settings (Pydantic) は migration 経路でも全 env を validate する
    # ため .env を読み込む。backend service と同一構成。
    env_file:
      - .env
    environment:
      # vector (table owner) で接続。alembic は public.* DDL を伴うため
      # vector_app では権限不足になる。
      MIGRATION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vector}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vector}
      # 過去の destructive migrations (4d16d9b326a0 等) は env guard 付き。
      # init service にのみ渡し backend runtime には渡さないことで accidental
      # destructive re-run を構造的に防ぐ。
      ALEMBIC_ALLOW_DESTRUCTIVE: "yes-i-know"
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: ["alembic", "upgrade", "head"]
    networks:
      - internal
    restart: "no"

  # --- Backend (internal only — no ports exposed to host) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # application runtime: vector_app (public.* DML + auth.user REFERENCES)
      - DATABASE_URL=postgresql+asyncpg://vector_app:${POSTGRES_APP_PASSWORD}@db:5432/${POSTGRES_DB:-vector}
      # alembic migration / pytest: vector (table owner) で接続
      - MIGRATION_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vector}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vector}
      - REDIS_URL=redis://redis:6379/0
    # Dockerfile CMD は uvicorn のみ (PR4 / red-team C2 防御)。migration は
    # db-init-alembic service が責務を持ち、backend は uvicorn 起動だけを行う。
    # 本番 (Fly.io) は fly.toml [deploy].release_command で migration を別経路実行。
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
    depends_on:
      db-init-alembic:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  # --- Database ---
  # red-team AUTH-C1 (db host expose 経由の admin 乗っ取り) を構造的に遮断:
  # - networks は internal 限定 (Docker の internal: true で外部 ingress/egress 遮断)
  # - ports は宣言なし (internal network では host port forward も無効化されるため)
  # dev で psql を使うときは `docker compose exec db psql -U vector vector` で
  # container 内 psql を使う。host から直接 db に接続する経路は完全に閉じる
  # (host port 宣言なし。統合テストは別 compose の `db-test` を loopback 限定で立てる)。
  db:
    image: pgvector/pgvector:0.8.2-pg18-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required; set a strong value in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vector}
      # red-team AUTH-N4: application-level role passwords. init script で
      # vector_auth / vector_app role を作るときに psql に渡す。
      POSTGRES_AUTH_PASSWORD: ${POSTGRES_AUTH_PASSWORD:?POSTGRES_AUTH_PASSWORD is required for vector_auth role}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD is required for vector_app role}
    volumes:
      # PG18 以降の Docker image は major-version 別ディレクトリ
      # (/var/lib/postgresql/18/docs/) にデータを置く設計に変わったため、
      # mount は親ディレクトリ /var/lib/postgresql を指す
      # (docker-library/postgres#1259)。
      - pgdata:/var/lib/postgresql
      # 初回 db 起動時に application role を作成する init script を mount。
      # 既存 dev volume では実行されないため、PR 本文の手動手順を参照すること。
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vector} -d ${POSTGRES_DB:-vector}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Redis (Task Queue Broker) ---
  # red-team C9 対策: maxmemory + allkeys-lru で OOM を構造的に防ぐ。
  # noeviction (default) では maxmemory 到達後に全 write reject となり、taskiq
  # broker / worker が道連れ shutdown する。allkeys-lru は taskiq stream key も
  # evict 対象になるが、stream backlog は MAXLEN=10_000 で頭打ちされており、
  # 256mb の予算下で broken な evict は通常発生しない。
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data
    networks:
      - internal

  # --- Redis (Frontend Rate Limit, ephemeral) ---
  # red-team C9 対策: proxy.ts rate-limit (rl:ip:* ZSET) 専用 instance。本体 redis
  # と物理分離して OOM 道連れを防ぐ。volume なし = restart で 60 秒 sliding window
  # の履歴が消えるが、運用上は許容 (1 分以内に新 bucket が作られる)。internal
  # network 限定で host port expose なし。
  #
  # Better Auth のログイン limiter は DB-backed (storage:"database") へ移行済みで
  # ここには載らない (ADR-007)。本 instance のキーは proxy IP limiter のみで全て
  # 60 秒 TTL を持つため、eviction は volatile-ttl (残 TTL 短いものから捨てる) が
  # 正しい。allkeys-lru / noeviction は不可: 後者は満杯時に write を拒否し proxy の
  # fail-open コードと相まって「満杯時に全体 bypass」を招く。
  redis-rl:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy volatile-ttl
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # --- taskiq workers (broker は分離維持、container 単位で failure domain ごとに集約) ---
  # 設計判断: broker 名 (broker_metadata 等) は無変更。多 process container は supervisord
  # で管理 (Pattern B: limited self-heal)。一過性故障は autorestart=unexpected +
  # startretries=3 で吸収、永続バグは 3 retries で FATAL → fail_fast eventlistener が
  # supervisord shutdown → container exit → docker / Fly.io が auto-restart loop で visible 化。
  # `init: true` (tini) は維持し PID 1 zombie reaping を担当 (supervisord は tini の child)。
  worker-fetch:
    <<: *worker-base
    init: true
    command: supervisord -n -c /app/supervisord/fetch.conf

  # --- taskiq workers: analysis (curation + assessment) + embedding を 1 container に同居 ---
  # broker (broker_analysis / broker_embedding) は分離維持し、container 単位で集約。
  # embedding は related-articles 専用で独立スケール要件が無く、analysis と failure
  # domain を共有するため同居する: 起動は GEMINI_API_KEY 共有で共倒れ、稼働時も
  # fail_fast が片 program の FATAL でコンテナごと落とすため同一 failure domain。
  worker-analysis:
    <<: *worker-base
    init: true
    command: supervisord -n -c /app/supervisord/analysis.conf

  worker-insights:
    <<: *worker-base
    init: true
    command: supervisord -n -c /app/supervisord/insights.conf

  # --- taskiq scheduler (metadata + trend discovery + briefing cron を 1 container に同居) ---
  scheduler:
    <<: *worker-base
    init: true
    command: supervisord -n -c /app/supervisord/scheduler.conf
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  pgdata:
  redisdata:
