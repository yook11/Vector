# ===========================================
# Vector - Docker Compose
# ===========================================

# --- Shared worker config (anchor only, not a service) ---
x-worker-base: &worker-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vector}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vector}
    - REDIS_URL=redis://redis:6379/0
  volumes:
    - ./backend/app:/app/app
  depends_on:
    backend:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - public
    - internal

services:
  # --- Frontend (BFF — public entry point) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required; generate one with `openssl rand -hex 32` and set it in .env}
      - BETTER_AUTH_URL=http://localhost:3000
      - AUTH_DATABASE_URL=postgresql://${POSTGRES_USER:-vector}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vector}?search_path=auth
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required; generate one with `openssl rand -hex 32` and set it in .env}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/components.json:/app/components.json
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/next.config.js:/app/next.config.js
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
      - internal

  # --- Backend (internal only — no ports exposed to host) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vector}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vector}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  # --- Database ---
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required; set a strong value in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vector}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vector} -d ${POSTGRES_DB:-vector}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - public
      - internal

  # --- Redis (Task Queue Broker) ---
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data
    networks:
      - internal

  # --- taskiq workers (one per pipeline queue) ---
  worker-metadata:
    <<: *worker-base
    command: >
      taskiq worker
      app.brokers:broker_metadata
      app.collection.tasks
      --ack-type when_executed

  worker-content:
    <<: *worker-base
    command: >
      taskiq worker
      app.brokers:broker_content
      app.collection.tasks
      --ack-type when_executed

  worker-analysis:
    <<: *worker-base
    command: >
      taskiq worker
      app.brokers:broker_analysis
      app.analysis.tasks
      --ack-type when_executed

  worker-embedding:
    <<: *worker-base
    command: >
      taskiq worker
      app.brokers:broker_embedding
      app.analysis.tasks
      --ack-type when_executed

  # --- Weekly digest worker + scheduler (snapshot 生成専用、resource 分離) ---
  worker-digest:
    <<: *worker-base
    command: >
      taskiq worker
      app.brokers:broker_digest
      app.digest.tasks.snapshot
      --ack-type when_executed

  scheduler-digest:
    <<: *worker-base
    command: >
      taskiq scheduler
      app.brokers:scheduler_digest
      app.digest.tasks.snapshot
    networks:
      - internal

  # --- taskiq scheduler (metadata broker only — fetch_metadata cron) ---
  scheduler:
    <<: *worker-base
    command: >
      taskiq scheduler
      app.brokers:scheduler_metadata
      app.collection.tasks
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  pgdata:
  redisdata:
