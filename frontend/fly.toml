# Public Fly app configuration example for the Vector frontend.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'your-vector-frontend-app'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# root redirectを正常と誤判定しないよう、未認証ログイン画面のSSR成功をrouting条件とする。
[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "2s"
  path = "/auth/login"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

# backend は flycast 経由のみ到達可能な internal-only 構成 (transport 層
# defense in depth)。frontend → backend の唯一の経路として server-only に
# 評価される (NEXT_PUBLIC_ プレフィックスを持たないため client bundle に
# 出ない)。公開 repo では placeholder を置き、実運用値は private deploy
# secrets / flyctl --env で渡す。
# frontend/src/lib/api/internal-config.ts が起動時に host が *.flycast で
# 終わることを fail-closed 検証する (NODE_ENV=production narrowing)。
[env]
  INTERNAL_API_URL = "http://your-vector-core-app.flycast:8000/api/v1"
  BETTER_AUTH_URL = "https://your-vector-frontend-app.fly.dev"
