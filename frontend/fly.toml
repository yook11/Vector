# fly.toml app configuration file generated for your-vector-frontend-app on 2026-05-06T11:28:11+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'your-vector-frontend-app'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

# backend は flycast 経由のみ到達可能な internal-only 構成 (transport 層
# defense in depth)。frontend → backend の唯一の経路として server-only に
# 評価される (NEXT_PUBLIC_ プレフィックスを持たないため client bundle に
# 出ない)。値は publicly-derivable な接続先識別子で秘密ではないため Fly
# secrets ではなく fly.toml [env] に置いて commit する (deploy 設定の
# 可視化を優先 — backend/fly.core.toml [env] ENV="production" と同じ思想)。
# frontend/src/lib/api/internal-config.ts が起動時に host が *.flycast で
# 終わることを fail-closed 検証する (NODE_ENV=production narrowing)。
[env]
  INTERNAL_API_URL = "http://your-vector-core-app.flycast:8000/api/v1"
  BETTER_AUTH_URL = "https://your-vector-frontend-app.fly.dev"
