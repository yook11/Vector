# 統合テスト専用 Postgres (`make test-integration` 経由でのみ起動)。
#
# 本体 `db` (本番想定 / host 非露出) とは network/volume 完全分離。
# 必ず `docker compose -p vector-test -f docker-compose.test.yml ...` で
# project 名を分離して呼び出す (Makefile の TEST_COMPOSE 変数で固定)。
# 同一ディレクトリで `-p` を省略すると default project 名が本体 compose と
# 衝突し、`down --remove-orphans` が本体側 container を巻き添えで消す危険がある。
#
# 構造:
# - image: 本体と同じ pgvector/pgvector:pg16
# - infra/db/init: 本体と同じ init script を mount → vector / vector_auth /
#   vector_app の 3 role 名 + extension が本番と揃う。GRANT 戦略は alembic
#   migration 側のため本 compose では再現しない (conftest の
#   metadata.create_all() でテーブル定義のみを再現する)
# - tmpfs: コンテナ down で全データ消失 (毎回 initdb から再構築)。過去の
#   "残ったデータでテストが偶然 pass する" 事故を構造的に閉塞
# - ports: 127.0.0.1 bind → LAN/外部から不可視
# - passwords: テスト固定値で hardcode (loopback only / ephemeral / test data
#   のため機密保護価値が低く、可読性を優先)
services:
  db-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vector
      POSTGRES_PASSWORD: test-vector-password
      POSTGRES_DB: vector
      POSTGRES_AUTH_PASSWORD: test-auth-password
      POSTGRES_APP_PASSWORD: test-app-password
    volumes:
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector -d vector"]
      interval: 1s
      timeout: 3s
      retries: 30
