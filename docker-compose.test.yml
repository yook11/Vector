# 統合テスト専用 Postgres (`make test-integration` 経由でのみ起動)。
#
# 本体 `db` (本番想定 / host 非露出) とは network/volume 完全分離。
# project 名は Makefile が worktree ごとに `vector-test-<slug>-<hash>` を算出し
# `-p` で注入する (TEST_COMPOSE 変数)。dev compose の project 名 (= worktree
# ディレクトリ basename) と衝突しないよう `vector-test-` prefix を必須とし、
# 空 / prefix 不一致 / 不正文字は test-integration-guard が fail-closed で止める。
# `-p` 省略や空 project 名は default project 名が本体 compose と衝突し、
# `down --remove-orphans` が本体側 container を巻き添えで消す危険があるため、
# guard を通さない直接呼び出しは禁止。
#
# 構造:
# - image: 本体と同じ pgvector/pgvector:0.8.2-pg18-bookworm
# - infra/db/init: 本体と同じ init script を mount → vector / vector_auth /
#   vector_app / vector_collect の 4 role 名 + extension が本番と揃う。GRANT 戦略は
#   alembic migration 側のため本 compose では再現しない (conftest の
#   metadata.create_all() でテーブル定義のみを再現する)
# - tmpfs: コンテナ down で全データ消失 (毎回 initdb から再構築)。過去の
#   "残ったデータでテストが偶然 pass する" 事故を構造的に閉塞
# - ports: 127.0.0.1 の random host port bind (`127.0.0.1::5432`) → LAN/外部から
#   不可視。host port を固定せず worktree 並列時のポート衝突を回避する。実 host
#   port は Makefile が `docker compose -p <proj> port db-test 5432` で解決して
#   DATABASE_URL に注入する
# - passwords: テスト固定値で hardcode (loopback only / ephemeral / test data
#   のため機密保護価値が低く、可読性を優先)
services:
  db-test:
    image: pgvector/pgvector:0.8.2-pg18-bookworm
    environment:
      POSTGRES_USER: vector
      POSTGRES_PASSWORD: test-vector-password
      POSTGRES_DB: vector
      POSTGRES_AUTH_PASSWORD: test-auth-password
      POSTGRES_APP_PASSWORD: test-app-password
      POSTGRES_COLLECT_PASSWORD: test-collect-password
    volumes:
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    tmpfs:
      # PG18 image は major-version 別ディレクトリにデータを置くため
      # 親 /var/lib/postgresql を tmpfs にする (docker-library/postgres#1259)。
      - /var/lib/postgresql
    ports:
      - "127.0.0.1::5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector -d vector"]
      interval: 1s
      timeout: 3s
      retries: 30
