[project]
name = "vector-backend"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.14,<2",
    "asyncpg>=0.30,<1",
    "bcrypt>=4.0,<6",
    "email-validator>=2.0,<3",
    "fastapi>=0.115,<1",
    "feedparser>=6.0,<7",
    "google-genai>=1.5,<2",
    "greenlet>=3.3.2",
    "httpx>=0.28,<1",
    "lxml>=5.0,<6",
    "trafilatura>=1.12,<2",
    "pydantic-settings>=2.7,<3",
    "pytest>=8.3,<9",
    "pytest-asyncio>=0.25,<1",
    "python-jose[cryptography]>=3.3,<4",
    "ruff>=0.9,<1",
    "sqlmodel>=0.0.22,<1",
    "structlog>=24.4,<26",
    "pgvector>=0.3.0,<1",
    "taskiq>=0.12,<1",
    "taskiq-redis>=1.0,<2",
    "uvicorn[standard]>=0.34,<1",
    "redis>=7.0,<8",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "S", "FAST"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106", "S311"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
