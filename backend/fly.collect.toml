# fly.collect.toml — vector-collect (secret-thin fetch worker)
#
# 本番バックエンドを 2 app に分割した「外部 web を fetch し untrusted HTML を
# parse する」側。RCE/SSRF の攻撃面を持つため、AI 鍵も本物 BFF 鍵も保持しない。
# 保持する秘密は DB (collection 最小権限 role) と Redis (AUTH) のみで、config が
# import 時に要求する未使用の必須鍵 (bff_jwt / revalidate) は throwaway random を
# secret で与える。fly.core.toml と同一 image を deploy する。
#
# See https://fly.io/docs/reference/configuration/

app = 'your-vector-collect-app'
primary_region = 'nrt'

[build]

# inbound を一切持たない: [[services]] を宣言せず public IP も割り当てない。
# worker-fetch はRedis Streamをpullし外部webへegressするのみ。broker_metadataは
# pipeline:metadataのdispatch / sweep control、broker_contentはpipeline:acquisitionと
# pipeline:completionの2 Streamを購読する共有consumerである。
# HTTP を listen しないため [[checks]] も置かない。永続バグは supervisord の
# fail_fast eventlistener が FATAL → container exit させ、Fly が restart loop で
# 可視化する (fetch.conf 参照)。

# fetch.conf は metadata + content の 2 program (各 --workers 1) を同居させ、各々が
# 親 + worker child を持つ。worker child は untrusted HTML の fetch/parse でヒープが
# 成長する (実測 122〜152MB と振れる)。512MB だと idle working set ~441MB で空き
# ~18MB しか無く、大きいページの parse で OOM 余地がある。実測 +74% のヘッドルーム
# を残し 768MB にする (RCE/SSRF 攻撃面を持つ worker のため安全側に倒す)。
[[vm]]
  memory = '768mb'
  cpus = 1
  processes = ['worker-fetch']

[env]
  ENV = "production"
  # collect は API も revalidate も持たないため以下 2 値は未使用だが、
  # backend/app/config.py が import 時に必須フィールドとして要求する。
  # _enforce_flycast_in_production が production で *.flycast 以外を拒否するため
  # placeholder も *.flycast 形式にする (誤った内部 DNS を持ち込むと crashloop)。
  INTERNAL_FRONTEND_BASE_URL = "http://your-vector-frontend-app.flycast:3000"
  # frontend_url は CORS allow_origins 用で collect では未使用。非秘密のため
  # placeholder を [env] に置き、本物は core のみが持つ (collect 侵害でも本物の
  # 公開 URL 設定すら漏らさない、というより単に不要)。
  FRONTEND_URL = "http://vector-collect-unused.invalid"

# worker-fetchのみ。fetch.confはbroker_metadataのdispatch/sweep制御と、broker_contentが
# pipeline:acquisition / pipeline:completionの両Streamを読む共有consumerを1 containerに
# 同居させる。back-fill / retention は
# broker_maintenance に分離済で core 側 (worker-analysis) が担うため本 app には無い。
[processes]
  worker-fetch = "supervisord -n -c /app/supervisord/fetch.conf"

# release_command は無し (migration は core/collect いずれの Fly runtime でも実行
# しない。CI/手元のみ)。
