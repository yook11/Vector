# fly.toml app configuration file generated for your-vector-backend-app on 2026-05-06T11:16:26+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'your-vector-backend-app'
primary_region = 'nrt'

[build]

# transport 層 internal-only 化 (defense in depth): backend は flycast 経由のみ
# 到達可能とする。Better Auth で frontend を信用する設計の「frontend からしか
# backend に届かない」境界をネットワーク層でも担保する (application 層の
# BFF_JWT_SIGNING_SECRET 検証と組合せて 2 層防御)。
# - [http_service] を撤去: public hostname (.fly.dev) への自動 binding を消す
# - [[services]] で internal_port=8000 だけ宣言: public IP を release 済なら
#   flycast (org-private DNS) からのみ届く
# - flycast は HTTP-only (TLS 終端なし) のため force_https は宣言しない
# 初回 deploy 手順: plan file の "Deploy 手順" セクション参照
# (fly ips allocate-v6 --private → fly ips release <public>)。
[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ['app']
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 8000
    handlers = ["http"]

# [http_service] の暗黙 healthcheck が消えるため、Machine-local HTTP probe を
# 独立宣言する。Fly agent が Machine 内 localhost:8000 を probe するので
# public IP release 後も動く (Fly proxy 経路に依存しない)。
[[checks]]
  port = 8000
  type = "http"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/api/v1/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

# production では FastAPI の /docs / /redoc / /openapi.json を無効化する
# (red-team S-EXFIL-1 / C3 amplifier 防御)。settings.env field 経由で
# backend/app/main.py が判定する。値は publicly-derivable な「環境識別子」で
# 秘密ではないため Fly secrets ではなく fly.toml [env] に置いて commit する
# (deploy 設定の可視化を優先)。
[env]
  ENV = "production"
  # backend → frontend revalidate 通知の宛先 (flycast 内部通信)。
  # backend/app/config.py の _enforce_flycast_in_production が production で
  # *.flycast 以外を拒否するため、本値と ENV="production" の組合せで起動時に
  # fail-closed 検証される (誤って "frontend" (compose DNS) や localhost を
  # 本番に持ち込んだ瞬間 Machine が crashloop する)。
  INTERNAL_FRONTEND_BASE_URL = "http://your-vector-frontend-app.flycast:3000"

# 本番は --reload なしで起動。Dockerfile の CMD (uvicorn のみ) と一致させる。
# [[services]].processes = ['app'] と process 名が一致する必要がある。
[processes]
  app = "uvicorn app.main:app --host :: --port 8000"

# release_command は app 起動前に毎 deploy 一度だけ実行される。i4_seed_e2e_users
# migration を分離した PR4 (red-team C2 防御) により、E2E seed user が本番 DB に
# 流れる経路は構造的に閉じている。alembic upgrade head は table owner role
# (POSTGRES_USER) で接続する MIGRATION_DATABASE_URL を使う必要があるため、Fly.io
# secrets として設定すること。
[deploy]
  release_command = "alembic upgrade head"
