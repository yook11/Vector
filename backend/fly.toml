# fly.toml app configuration file generated for your-vector-backend-app on 2026-05-06T11:16:26+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'your-vector-backend-app'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

# 本番は --reload なしで起動。Dockerfile の dev 用 CMD を上書き。
# [http_service].processes = ['app'] と process 名が一致する必要がある。
# 注: alembic upgrade head は意図的に [deploy].release_command に入れていない。
# i4_seed_e2e_users migration が本番 DB に流れる事故を避けるため、E2E seed の
# 扱い (alembic 外への退避 or env gate) を確定してから別 PR で追加する。
[processes]
  app = "uvicorn app.main:app --host :: --port 8000"
